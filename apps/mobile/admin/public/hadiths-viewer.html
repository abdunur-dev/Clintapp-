<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hadith Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0B0C1A;
  color: #E8DCC8;
  font-family: 'Cormorant Garamond', Georgia, serif;
  min-height: 100vh;
}
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Noto+Sans+Ethiopic:wght@400;600&display=swap');

.header {
  padding: 32px 28px 20px;
  border-bottom: 1px solid #252650;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
  background: #13142A;
}
.header h1 { font-size: 28px; color: #C9A84C; font-weight: 600; }
.header p { font-size: 12px; color: #7878A0; margin-top: 2px; }
.controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.controls select, .controls input {
  padding: 8px 14px;
  border-radius: 8px;
  border: 1px solid #252650;
  background: #0B0C1A;
  color: #E8DCC8;
  font-size: 13px;
  outline: none;
  min-width: 180px;
}
.controls select { cursor: pointer; }
.controls input { min-width: 220px; }
.count { font-size: 12px; color: #7878A0; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 20px;
  padding: 28px;
  max-width: 1400px;
  margin: 0 auto;
}
.card {
  background: linear-gradient(135deg, #1A1520 0%, #1F1825 100%);
  border-radius: 14px;
  border: 1px solid #3A2A30;
  padding: 24px;
  position: relative;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(201,168,76,0.08);
  transition: transform 0.2s;
}
.card:hover { transform: translateY(-2px); border-color: #C9A84C44; }
.badge-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.badge { font-size: 10px; font-weight: 700; color: #C9A84C; text-transform: uppercase; letter-spacing: 1.5px; opacity: 0.8; }
.hadith-num { font-size: 11px; color: #C9A84C88; font-weight: 600; }
.arabic { font-size: 24px; line-height: 1.8; color: #E8DCC8; margin-bottom: 14px; text-align: right; direction: rtl; font-weight: 500; }
.english { font-size: 15px; color: #C8BFA0; line-height: 1.7; margin: 8px 0; font-style: italic; }
.amharic { font-size: 14px; color: #A89880; line-height: 1.7; margin: 8px 0; }
.meta-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; padding-top: 12px; border-top: 1px solid #2A1E28; }
.narrator { font-size: 12px; color: #A0A0C0; font-style: italic; }
.grade { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.grade.sahih { color: #4A8C5C; }
.chapter { font-size: 10px; color: #C9A84C66; margin-top: 6px; text-transform: uppercase; letter-spacing: 1px; }

.loading, .empty {
  display: flex; flex-direction: column; align-items: center; gap: 16px;
  padding: 80px 0; color: #7878A0; font-size: 15px;
}
.spinner { width: 28px; height: 28px; border: 3px solid #252650; border-top-color: #C9A84C; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 640px) {
  .grid { grid-template-columns: 1fr; padding: 16px; }
  .header { padding: 20px 16px; flex-direction: column; align-items: flex-start; }
  .controls { width: 100%; }
  .controls select, .controls input { flex: 1; min-width: 0; }
  .arabic { font-size: 20px; }
}
</style>
<body>
<div class="header">
  <div>
    <h1>Hadith</h1>
    <p>Navigate the prophetic traditions</p>
  </div>
  <div class="controls">
    <select id="bookFilter"><option value="">All Books</option></select>
    <input id="search" type="text" placeholder="Search number, book, narrator...">
    <span class="count" id="count"></span>
  </div>
</div>
<div id="content"><div class="loading"><div class="spinner"></div><p>Loading hadiths...</p></div></div>

<script>
const API = (window.location.port === '5173' || window.location.port === '3000')
  ? 'http://localhost:4000/api' : '/api';

let hadiths = [];

async function loadBooks() {
  try {
    const r = await fetch(`${API}/hadiths/books`);
    const books = await r.json();
    const sel = document.getElementById('bookFilter');
    books.forEach(b => { const o = document.createElement('option'); o.value = b; o.textContent = b; sel.appendChild(o); });
  } catch {}
}

async function loadHadiths() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading hadiths...</p></div>';
  try {
    const params = new URLSearchParams({ limit: '200' });
    const book = document.getElementById('bookFilter').value;
    const search = document.getElementById('search').value;
    if (book) params.set('book', book);
    if (search) params.set('search', search);
    const r = await fetch(`${API}/hadiths?${params}`);
    const data = await r.json();
    hadiths = data.hadiths || [];
    document.getElementById('count').textContent = `${hadiths.length} hadiths`;
    render();
  } catch {
    content.innerHTML = '<div class="empty"><p>Failed to load hadiths. Make sure the API is running.</p></div>';
  }
}

function render() {
  const content = document.getElementById('content');
  if (hadiths.length === 0) {
    content.innerHTML = '<div class="empty"><p>No hadiths found</p></div>';
    return;
  }
  content.innerHTML = '<div class="grid"></div>';
  const grid = content.querySelector('.grid');
  hadiths.forEach(h => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="badge-row">
        <span class="badge">${esc(h.book)}</span>
        <span class="hadith-num">#${h.hadithNumber}</span>
      </div>
      <div class="arabic">${esc(h.arabic)}</div>
      ${h.english ? `<div class="english">"${esc(h.english)}"</div>` : ''}
      ${h.amharic ? `<div class="amharic">${esc(h.amharic)}</div>` : ''}
      <div class="meta-row">
        ${h.narrator ? `<span class="narrator">— ${esc(h.narrator)}</span>` : '<span></span>'}
        ${h.grade ? `<span class="grade ${h.grade.toLowerCase()}">${esc(h.grade)}</span>` : ''}
      </div>
      ${h.chapter ? `<div class="chapter">${esc(h.chapter)}</div>` : ''}
    `;
    grid.appendChild(card);
  });
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

document.getElementById('bookFilter').addEventListener('change', loadHadiths);
let searchTimer;
document.getElementById('search').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadHadiths, 300);
});

loadBooks();
loadHadiths();
</script>
</body>
</html>
